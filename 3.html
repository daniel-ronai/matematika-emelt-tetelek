    tags: ["app"],
    content: `
      <div class="step-label">Hol találkozunk ezzel a való életben?</div>
      <div class="block app">
        • <b>Kriptográfia és Adatvédelem:</b> A prímszámok (különösen a hatalmas Mersenne-prímek) képezik a modern digitális biztonság alapját. A WiFi hálózatok titkosítása (WPA2-PSK/AES) és a banki tranzakciók, elektronikus aláírások mögött álló <b>RSA-eljárás</b> mind az óriási számok prímfelbontásának nehézségére (időigényességére) épülnek.<br>
        • <b>Diofantoszi egyenletek:</b> Az olyan egyenleteket, ahol csak egész megoldásokat keresünk, szinte mindig oszthatósági vizsgálatokkal és maradékcsoportokkal oldjuk meg.<br>
        • <b>Informatika / Hardver:</b> A hexadecimális számrendszer mindennapos az informatikában. Minden hálózati eszköz (mobil, PC) rendelkezik egy teljesen egyedi fizikai címmel, az úgynevezett <b>MAC-címmel</b> (pl. egy router alapú WiFi szűrésnél), amely 12 darab, kötőjelekkel elválasztott tizenhatos számrendszerbeli számjegyből áll.
      </div>`
  }
  // ----------------------------------------------------
];

const tagLabels = { def: 'Definíció', thm: 'Tétel', biz: 'Bizonyítás', app: 'Felelet / Alk.' };
const done = new Set();
const progressEl = document.getElementById('progress');
const container = document.getElementById('sections');

progressEl.style.display = 'flex';
progressEl.style.gap = '6px';
progressEl.style.flexWrap = 'wrap';

sections.forEach((s, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.title = s.title;
  dot.onclick = () => openCard(s.id);
  progressEl.appendChild(dot);
});

sections.forEach(s => {
  const tagHTML = s.tags.map(t => `<span class="tag tag-${t}">${tagLabels[t]}</span>`).join('');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + s.id;
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${s.id})">
      <div class="title-row">${tagHTML}<span class="card-title">${s.title}</span></div>
      <span class="chevron" id="chev-${s.id}">▼</span>
    </div>
    <div class="card-body" id="body-${s.id}">${s.content}</div>`;
  container.appendChild(card);
});

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  if (!isOpen) { 
    done.add(id); 
    updateDots();
    if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  }
}

function openCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.add('open');
  chev.classList.add('open');
  done.add(id);
  updateDots();
  if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  document.getElementById('card-' + id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateDots() {
  const dots = progressEl.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot' + (done.has(i) ? ' done' : '');
  });
}

toggleCard(0);
</script>
</body>
</html>

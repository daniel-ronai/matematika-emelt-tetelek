        A <b>halmaz</b> és a halmaz <b>eleme</b> matematikai alapfogalmak, így nem definiáljuk őket, csak körülírjuk (pl. összesség, csoport, benne van).<br>
        • <b>A halmazlétezés feltétele:</b> Akkor beszélhetünk halmazról, ha bármely dologról egyértelműen és ellentmondásmentesen eldönthető, hogy hozzátartozik-e vagy sem.<br>
        • <b>Jelölések:</b> Az elemeket kisbetűvel ($a \\in A$), a halmazokat nagybetűvel ($A$) jelöljük. Ha egy elem nem része a halmaznak: $b \\notin A$. Egy halmazban egy elem <i>pontosan egyszer</i> szerepelhet.<br>
        • <b>Nevezetes számhalmazok:</b> $\\mathbb{N}$ (természetes számok), $\\mathbb{Z}$ (egész számok), $\\mathbb{Q}$ (racionális számok), $\\mathbb{Q}^*$ (irracionális számok), $\\mathbb{R}$ (valós számok). Részhalmazok jelölése pl.: $\\mathbb{Z}^+$, $\\mathbb{R}^-$.

        • <b>Üres halmaz ($\\emptyset$ vagy $\\{\\}$):</b> Olyan halmaz, amelynek egyetlen eleme sincs.<br>
        • <b>Egyenlőség ($A = B$):</b> Két halmaz egyenlő, ha pontosan ugyanazok az elemeik.<br>

        • <b>Valódi részhalmaz ($A \\subset B$):</b> $A$ valódi részhalmaza $B$-nek, ha $A \\subseteq B$, de $B$-nek van legalább egy olyan eleme, amely nem eleme $A$-nak.

        <div class="step-label">A reláció tulajdonságai</div>
        Tetszőleges $A$, $B$ és $C$ halmazokra igazak a következő állítások:<br>
        1. <b>Reflexivitás:</b> $A \\subseteq A$ (minden halmaz részhalmaza önmagának).<br>
        2. <b>Tranzitivitás:</b> Ha $A \\subseteq B$ és $B \\subseteq C$, akkor $A \\subseteq C$.<br>
        3. <b>Antiszimmetria:</b> Ha $A \\subseteq B$ és $B \\subseteq A$, akkor $A = B$.<br><br>
        <span style="color:var(--teal)"><b>Vizsgáztatói megjegyzés:</b> Az antiszimmetria tételt rendkívül gyakran használjuk a szóbelin két összetett halmazművelet egyenlőségének precíz, kétoldalú bizonyítására!</span>

        $$\\{x : x \\in A \\lor x \\in B\\}$$
        • <b>Metszet ($A \\cap B$):</b> Azon elemek halmaza, amelyek mindkét halmaznak elemei.<br>
        $$\\{x : x \\in A \\land x \\in B\\}$$
        • <b>Különbség ($A \\setminus B$):</b> Azon elemek halmaza, amelyek elemei $A$-nak, de nem elemei $B$-nek.<br>
        $$\\{x : x \\in A \\land x \\notin B\\}$$
        • <b>Szimmetrikus különbség ($A \\Delta B$):</b> Azon elemek halmaza, amelyek vagy csak $A$-nak, vagy csak $B$-nek elemei.<br>
        $$A \\Delta B = \\{x : (x \\in A \\lor x \\in B) \\land x \\notin (A \\cap B)\\}$$
        Alternatív felírása: $A \\Delta B = (A \\setminus B) \\cup (B \\setminus A)$<br><br>
        • <b>Descartes- (direkt) szorzat ($A \\times B$):</b> Azon rendezett $(a, b)$ párok halmaza, amelyek első tagja az $A$ halmaz, második tagja pedig a $B$ halmaz eleme.<br>
        $$A \\times B = \\{(a, b) : a \\in A \\land b \\in B\\}$$

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + s.id;
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${s.id})">
      <div class="title-row">${tagHTML}<span class="card-title">${s.title}</span></div>
      <span class="chevron" id="chev-${s.id}">▼</span>
    </div>
    <div class="card-body" id="body-${s.id}">${s.content}</div>`;
  container.appendChild(card);
});

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  if (!isOpen) { 
    done.add(id); 
    updateDots();
    if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  }
}

function openCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.add('open');
  chev.classList.add('open');
  done.add(id);
  updateDots();
  if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  document.getElementById('card-' + id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateDots() {
  const dots = progressEl.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot' + (done.has(i) ? ' done' : '');
  });
}

toggleCard(0);
</script>
</body>
</html>

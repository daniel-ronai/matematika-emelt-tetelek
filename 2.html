        • <b>A számegyenes definíciója:</b> Olyan egyenes, amelyen kijelölünk két pontot, az egyikhez a $0$, a másikhoz az $1$ valós számot rendeljük. A két pont távolságát <b>egységnek</b> nevezzük.<br>

      <div class="block thm">

      <div class="block biz">
        <div class="step-label">Bizonyítás: $|\\mathbb{Z}^+| = |\\mathbb{Q}^+|$ (Cantor-féle átlós módszer)</div>

        2. Ezzel a mátrixszal az összes pozitív racionális számot felírtuk, ráadásul a bővítések miatt minden szám végtelen sokszor szerepel (pl. $\\frac{1}{1}, \\frac{2}{2}, \\frac{3}{3}$).<br>

        • <b>A modern halmazelmélet válasza:</b> Kurt Gödel (1940) bebizonyította, hogy a hipotézis nem cáfolható, Paul Cohen (1963) pedig belátta, hogy nem is bizonyítható a standard ZFC halmazelméleti axiómarendszerben. Az állítás tehát a halmazelmélettől <b>független</b>, összhangban a Gödel-féle nemteljességi tétellel.

const tagLabels = { def: 'Definíció', thm: 'Tétel', biz: 'Bizonyítás', app: 'Felelet / Alk.' };
const done = new Set();
const progressEl = document.getElementById('progress');
const container = document.getElementById('sections');

progressEl.style.display = 'flex';
progressEl.style.gap = '6px';
progressEl.style.flexWrap = 'wrap';

sections.forEach((s, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.title = s.title;
  dot.onclick = () => openCard(s.id);
  progressEl.appendChild(dot);
});

sections.forEach(s => {
  const tagHTML = s.tags.map(t => `<span class="tag tag-${t}">${tagLabels[t]}</span>`).join('');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + s.id;
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${s.id})">
      <div class="title-row">${tagHTML}<span class="card-title">${s.title}</span></div>
      <span class="chevron" id="chev-${s.id}">▼</span>
    </div>
    <div class="card-body" id="body-${s.id}">${s.content}</div>`;
  container.appendChild(card);
});

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  if (!isOpen) { 
    done.add(id); 
    updateDots();
    if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  }
}

function openCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.add('open');
  chev.classList.add('open');
  done.add(id);
  updateDots();
  if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  document.getElementById('card-' + id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateDots() {
  const dots = progressEl.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot' + (done.has(i) ? ' done' : '');
  });
}

toggleCard(0);
</script>

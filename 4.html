      </div>
      <div class="block thm">
        <div class="step-label">Szükséges és elégséges feltétel egyszerre</div>
        Ha az $A \\Leftrightarrow B$ ekvivalencia igaz (<i>„A akkor és csak akkor, ha B”</i>), akkor $A$ <b>szükséges és elégséges feltétele</b> $B$-nek (és fordítva). Ekkor a tétel és annak megfordítása is egyszerre igaz.<br>
        • <b>Példa:</b> <i>„Egy egész szám akkor és csak akkor osztható 12-vel, ha osztható 3-mal és 4-gyel.”</i> (A 3-mal és 4-gyel való oszthatóság szükséges és elégséges feltétele a 12-vel való oszthatóságnak).
      </div>`
  },
  {
    id: 7,
    title: "A logika szerepe a bizonyítási módszerekben",
    tags: ["thm", "biz"],
    content: `
      <div class="block thm">
        A matematikai gondolkodás és a tételek levezetése két alapvető logikai következtetési láncra épül:
      </div>
      <div class="block biz">
        <div class="step-label">1. Direkt bizonyítás</div>
        A direkt bizonyítás során az implikáció <b>tranzitív tulajdonságát</b> használjuk ki:<br>
        $$[(A \\Rightarrow B) \\land (B \\Rightarrow C)] \\Rightarrow (A \\Rightarrow C)$$
        Ismert, igaz állításokból (axiómákból vagy korábban igazolt tételekből) kiindulva, logikailag zárt lépések sorozatával eljutunk a bizonyítandó állításig.
      </div>
      <div class="block biz">
        <div class="step-label">2. Indirekt bizonyítás (Reductio ad absurdum)</div>
        Az indirekt bizonyítás mögött az a logikai azonosság áll, hogy egy implikáció logikailag ekvivalens a <b>kontrapozíciójával</b> (azaz ha az állítás igaz, akkor a tagadások megfordított következménye is igaz):<br>
        $$(A \\Rightarrow B) \\iff (\\neg B \\Rightarrow \\neg A)$$
        <b>A szóbeli felelet levezetési menete:</b><br>
        1. Feltesszük az eredeti állítás ellenkezőjét (hogy a $B$ konklúzió <i>nem igaz</i>: $\\neg B$).<br>
        2. Ebből kiindulva logikailag helyes lépésekkel eljutunk egy olyan állításig ($\\neg A$), amely nyilvánvalóan <b>ellentmondásban áll</b> az $A$ feltételünkkel, egy axiómával vagy egy korábbi tétellel.<br>
        3. Mivel a gondolatmenetünkben nem követtünk el hibát, az ellentmondást csak a hibás (indirekt) feltevésünk okozhatta. Következésképpen az eredeti állításnak igaznak kell lennie.
      </div>`
  }
  // ----------------------------------------------------
];

const tagLabels = { def: 'Definíció', thm: 'Tétel', biz: 'Bizonyítás', app: 'Felelet / Alk.' };
const done = new Set();
const progressEl = document.getElementById('progress');
const container = document.getElementById('sections');

progressEl.style.display = 'flex';
progressEl.style.gap = '6px';
progressEl.style.flexWrap = 'wrap';

sections.forEach((s, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.title = s.title;
  dot.onclick = () => openCard(s.id);
  progressEl.appendChild(dot);
});

sections.forEach(s => {
  const tagHTML = s.tags.map(t => `<span class="tag tag-${t}">${tagLabels[t]}</span>`).join('');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + s.id;
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${s.id})">
      <div class="title-row">${tagHTML}<span class="card-title">${s.title}</span></div>
      <span class="chevron" id="chev-${s.id}">▼</span>
    </div>
    <div class="card-body" id="body-${s.id}">${s.content}</div>`;
  container.appendChild(card);
});

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  if (!isOpen) { 
    done.add(id); 
    updateDots();
    if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  }
}

function openCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.add('open');
  chev.classList.add('open');
  done.add(id);
  updateDots();
  if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([body]); }
  document.getElementById('card-' + id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateDots() {
  const dots = progressEl.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot' + (done.has(i) ? ' done' : '');
  });
}

toggleCard(0);
</script>
</body>
</html>
